name: Use Visitor Counter Logic

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Allows manual triggering
  # schedule:
  #   - cron: '0 0 * * *' # Runs daily at midnight
    
permissions:
  contents: write
  pull-requests: write

jobs:
  update-visitor-count:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run visitor counter logic locally
        run: |
          node <<'EOF'
          const fs = require('fs');

          const repo = process.env.REPO;
          const token = process.env.TRAFFIC_TOKEN;
          const metricsPath = 'metrics.json';
          const markdownFiles = [
            'README.md',
            'DEMO.md',
            'terraform-infrastructure/README.md'
          ];

          if (!repo || !token) {
            throw new Error('REPO and TRAFFIC_TOKEN environment variables are required.');
          }

          async function fetchViews() {
            const response = await fetch(`https://api.github.com/repos/${repo}/traffic/views`, {
              headers: {
                Accept: 'application/vnd.github+json',
                Authorization: `Bearer ${token}`,
                'X-GitHub-Api-Version': '2022-11-28'
              }
            });

            if (!response.ok) {
              const body = await response.text();
              throw new Error(`GitHub traffic API request failed: ${response.status} ${body}`);
            }

            const payload = await response.json();
            return payload.views.map((entry) => ({
              date: entry.timestamp.slice(0, 10),
              count: entry.count,
              uniques: entry.uniques
            }));
          }

          function mergeMetrics(existing, latest) {
            const byDate = new Map(existing.map((entry) => [entry.date, entry]));
            for (const entry of latest) {
              byDate.set(entry.date, entry);
            }
            return Array.from(byDate.values()).sort((left, right) => left.date.localeCompare(right.date));
          }

          function updateBadge(markdown, totalViews) {
            return markdown.replace(
              /(<!-- START BADGE -->)([\s\S]*?)(<!-- END BADGE -->)/,
              `$1\n<p align="left">\n  <img src="https://img.shields.io/badge/Total%20views-${totalViews}-limegreen" alt="Total views">\n</p>\n$3`
            );
          }

          async function main() {
            const latestMetrics = await fetchViews();
            const existingMetrics = fs.existsSync(metricsPath)
              ? JSON.parse(fs.readFileSync(metricsPath, 'utf8'))
              : [];
            const mergedMetrics = mergeMetrics(existingMetrics, latestMetrics);
            const totalViews = mergedMetrics.reduce((sum, entry) => sum + entry.count, 0);

            fs.writeFileSync(metricsPath, `${JSON.stringify(mergedMetrics, null, 2)}\n`);

            for (const file of markdownFiles) {
              const current = fs.readFileSync(file, 'utf8');
              const updated = updateBadge(current, totalViews);
              fs.writeFileSync(file, updated);
            }
          }

          main().catch((error) => {
            console.error(error);
            process.exitCode = 1;
          });
          EOF
        env:
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
          REPO: ${{ github.repository }}

      - name: List files for debugging
        run: |
          ls -l

      - name: Configure Git author
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and merge changes
        env:
          PR_BRANCH: ${{ github.head_ref || github.ref_name }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          # Ensure we're on the correct branch
          git switch -c "$PR_BRANCH" || git switch "$PR_BRANCH"
          
          # Stage and commit changes if any
          git add -A
          git diff --staged --quiet || git commit -m "Update visitor count"
          
          # Pull and merge existing changes
          git pull origin "$PR_BRANCH" --no-rebase
          
          # Push all changes
          git push origin "$PR_BRANCH"
